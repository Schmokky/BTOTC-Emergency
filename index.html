<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Protected</title>
<meta name="robots" content="noindex, nofollow">
<style>
body { margin: 0; padding: 1rem; font-family: Arial, Helvetica, sans-serif; background: #f5f5f5; color: #222; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { width: 100%; max-width: 25rem; background: white; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; }
.alert { display: none; padding: 0.75rem 1rem; background: #fdecea; color: #b00020; border-bottom: 1px solid #f5c2c7; }
.content { padding: 2rem; text-align: center; }
input { width: 100%; padding: 0.7rem 0.8rem; font-size: 1rem; margin-bottom: 1rem; box-sizing: border-box; }
button { width: 100%; padding: 0.7rem 1rem; font-size: 1rem; border: none; border-radius: 8px; background: #222; color: white; cursor: pointer; }
</style>
</head>
<body>
<div class="card">
  <div class="alert" data-id="alert">Incorrect password. Please try again.</div>
  <div class="content">
    <h1>Password Required</h1>
    <p>Enter your password to continue</p>
    <input type="password" data-id="password" placeholder="Enter password">
    <button type="button" data-id="button">Continue</button>
  </div>
</div>
<script type="module">
class PasswordGate {
  constructor() {
    this.elements = {
      alert: document.querySelector('[data-id="alert"]'),
      password: document.querySelector('[data-id="password"]'),
      button: document.querySelector('[data-id="button"]'),
    };
    this.init();
  }

  init() {
    this.elements.button.addEventListener('click', () => this.handleSubmit());
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') this.handleSubmit();
    });
  }

  async hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hashBuffer = await crypto.subtle.digest('SHA-1', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async handleSubmit() {
    const password = this.elements.password.value;
    const hash = await this.hashPassword(password);
    const url = `${hash}/contacts.html`;

    try {
      const response = await fetch(url, { method: 'GET', cache: 'no-store' });
      if (response.ok) {
        window.location.href = url;
      } else {
        this.handleError();
      }
    } catch (error) {
      this.handleError();
    }
  }

  handleError() {
    this.elements.alert.style.display = 'block';
    this.elements.password.value = '';
    this.elements.password.setAttribute('placeholder', 'Incorrect password');
    this.elements.password.focus();
  }
}

new PasswordGate();
</script>
</body>
</html>
